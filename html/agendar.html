<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Detroit Barbearia — Cortes premium, barba e plano mensal por assinatura em Cidade Ocidental, GO. Estilo urbano, técnica precisa.">
    <title>Detroit Barber</title>
    <link rel="shortcut icon" href="../assets/LogoDetroit.jpg" type="image/x-icon">
    <link rel="preload" as="image" href="../assets/Corte2Detroit.png">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/age.css">
</head>

<body>
    <section class="agendamento">
        <div class="logo">
            <a href="../html/index.html"><img src="../assets/LogoDetroit.jpg" alt="Logo-Detroit-Barbearia"></a>
        </div>
        <h2>Agendar Horário</h2>

        <div class="agendar">
            <h2>Agende</h2>
            <form action="#" method="post">
                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Digite seu nome completo...">

                <label for="nmr">Telefone</label>
                <input type="tel" id="nmr" placeholder="Digite seu número...">

                <label for="date">Data e Hora</label>
                <input type="datetime-local" id="date">

                <button type="submit">Agendar</button>
            </form>
        </div>
    </section>

    <script src="../js/script.js"></script>
</body>
